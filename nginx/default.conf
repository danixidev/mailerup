# nginx interno del contenedor MailerUp.
# El nginx del HOST (termina TLS con Cloudflare) hace proxy_pass a este nginx,
# que sirve el SPA y reenvía la API / endpoints públicos al contenedor web.
upstream mailerup_web {
    server web:8100;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # Reenvía la cabecera de protocolo ORIGINAL que puso el nginx del host
    # (https). Si usáramos $scheme aquí sería http interno y Django entraría
    # en bucle de redirección por SECURE_SSL_REDIRECT.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Estáticos de Django (admin + DRF) servidos por whitenoise en web.
    location /static/ {
        proxy_pass http://mailerup_web;
    }

    # API, admin, endpoints públicos incrustados en los correos y recursos adjuntos.
    location ~ ^/(api|admin|u|o|c|oa|ca|subscribe|verify-subscription|recurso)(/|$) {
        proxy_pass http://mailerup_web;
    }

    # SPA (routing en cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
